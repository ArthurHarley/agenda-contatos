<div class="container">
  <div class="card">
    <h1>Lista de Contatos</h1>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let contato of contatos; let i = index">
          <td>{{ contato.nome }}</td>
          <td>{{ contato.email }}</td>
          <td>{{ contato.telefone }}</td>

          <td>
            <div class="acoes">
              <button class="btn-editar" (click)="editar(i)">Editar</button>
              <button class="btn-excluir" (click)="confirmarRemocao(i)">Excluir</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <button class="btn-adicionar" (click)="irParaNovo()">+ Adicionar</button>
  </div>
</div>
